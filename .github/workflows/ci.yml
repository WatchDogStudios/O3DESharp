#
# CI for the C# / Python parts of the O3DESharp gem.
#
# We deliberately do NOT build the C++ runtime here: that requires a full
# checkout of O3DE and is impractical on a free GitHub-hosted runner. This
# workflow exists to catch regressions in the C# binding generator, the
# O3DE.Core scripting API, and the Python editor scripts before they land on
# main.
#

name: ci

on:
  push:
    # Run on every push to the long-lived branches. development is the
    # active integration branch where new phases land; main is the
    # release-pinned mirror. Adding development was the Phase 18-E2
    # release-prep fix - CI was previously dark on every dev-branch push.
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  csharp:
    name: csharp build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK (9.x for runtime, 8.x for tools)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore + build O3DE.Core (net9)
        run: dotnet build Assets/Scripts/O3DE.Core/O3DE.Core.csproj -c Release --nologo

      - name: Restore + build BindingGenerator (net8 tool)
        run: dotnet build Code/Tools/BindingGenerator/O3DESharp.BindingGenerator/O3DESharp.BindingGenerator.csproj -c Release --nologo

      - name: Restore + build BindingGenerator.Tasks (netstandard2.0 MSBuild task)
        run: dotnet build Code/Tools/BindingGenerator/O3DESharp.BindingGenerator.Tasks/O3DESharp.BindingGenerator.Tasks.csproj -c Release --nologo

      - name: Restore + build SourceGenerators (netstandard2.0 Roslyn analyzer)
        run: dotnet build Code/Tools/SourceGenerators/O3DESharp.SourceGenerators.csproj -c Release --nologo

      - name: Build SourceGenerators smoke consumer (exercises the [EBus] generator end-to-end)
        # This consumer carries a partial ScriptComponent decorated with
        # [EBus] / [EBusHandler] attributes covering primitive args, math
        # args, zero-arg events and an 8-arg event. The build succeeding
        # means the generator emitted compilable C#; if the emit shape
        # regresses, this fails before the change can land.
        run: dotnet build Code/Tools/SourceGenerators.Tests/SourceGenerators.Smoke.csproj -c Release --nologo

      - name: Run BindingGenerator unit tests
        run: dotnet test Code/Tools/BindingGenerator.Tests/BindingGenerator.Tests.csproj -c Release --nologo --logger "console;verbosity=normal"

  python:
    name: python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run editor / binding-generator Python tests
        working-directory: Editor/Tests
        run: pytest -v --tb=short
