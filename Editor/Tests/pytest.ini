[pytest]
# Pytest configuration for O3DESharp Python tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.10

# Test paths
testpaths = .

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests with mocked dependencies
    integration: Integration tests using real gem data
    slow: Tests that take significant time to run

# Coverage options (if pytest-cov is installed)
# addopts = --cov=../Scripts --cov-report=html --cov-report=term

# Ignore paths
norecursedirs = .git __pycache__ *.egg-info .pytest_cache

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Timeout for tests (requires pytest-timeout)
# timeout = 60

# Fail on first error (useful for development)
# addopts = -x
